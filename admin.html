<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Troll Runner Admin</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111218;
      color: #fff;
    }
    .wrap {
      max-width: 820px;
      margin: 36px auto;
      padding: 0 16px;
    }
    h1 { margin-bottom: 8px; }
    p { color: rgba(255,255,255,0.7); }
    .card {
      background: #1a1c24;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 14px;
      margin-top: 14px;
    }
    label { display: block; font-size: 13px; margin-bottom: 6px; color: rgba(255,255,255,0.8); }
    input, textarea {
      width: 100%;
      box-sizing: border-box;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.18);
      background: #12141a;
      color: #fff;
      padding: 10px;
      font-size: 14px;
    }
    textarea { min-height: 100px; resize: vertical; }
    .row { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
    button {
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      padding: 10px 12px;
      color: #fff;
      background: #007aff;
      cursor: pointer;
      font-weight: 600;
    }
    button.secondary { background: #2b2d36; }
    .preview .item {
      background: #12141a;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 10px;
      margin-top: 8px;
    }
    a { color: #66aaff; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Troll Runner Admin</h1>
    <p>Add latest updates quickly. These updates save in your browser and appear on the homepage.</p>
    <p><a href="index.html">← Back to site</a></p>

    <div class="card">
      <label for="u-title">Update title</label>
      <input id="u-title" placeholder="April 7, 2026 — New Drop">

      <div style="height:10px"></div>
      <label for="u-body">Update body</label>
      <textarea id="u-body" placeholder="Placed stickers at..."></textarea>

      <div class="row">
        <button onclick="addUpdate()">Add update</button>
        <button class="secondary" onclick="clearUpdates()">Clear all custom updates</button>
      </div>
    </div>

    <div class="card preview">
      <h3>Saved custom updates</h3>
      <div id="preview"></div>
    </div>

    <div class="card preview">
      <h3>Feedback to admin system</h3>
      <div id="feedback-preview"></div>
      <div class="row">
        <button class="secondary" onclick="clearFeedback()">Clear feedback inbox</button>
      </div>
    </div>
  </div>

  <script>
    const AUTH_KEY = 'trollrunner_admin_auth';
    const UPDATES_KEY = 'trollrunner_updates';
    const FEEDBACK_KEY = 'trollrunner_feedback';
    if (localStorage.getItem(AUTH_KEY) !== '1') {
      window.location.href = 'index.html';
    }

    function escapeHtml(str) {
      return str.replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
    }

    function getUpdates() {
      try {
        return JSON.parse(localStorage.getItem(UPDATES_KEY) || '[]');
      } catch {
        return [];
      }
    }

    function setUpdates(items) {
      localStorage.setItem(UPDATES_KEY, JSON.stringify(items));
    }

    function renderUpdates() {
      const wrap = document.getElementById('preview');
      const updates = getUpdates();
      wrap.innerHTML = updates.length
        ? updates.map(u => `<div class="item"><strong>${escapeHtml(u.title)}</strong><p>${escapeHtml(u.body)}</p></div>`).join('')
        : '<p>No custom updates yet.</p>';
    }

    function addUpdate() {
      const title = document.getElementById('u-title').value.trim();
      const body = document.getElementById('u-body').value.trim();
      if (!title || !body) {
        alert('Please enter both title and body.');
        return;
      }
      const updates = getUpdates();
      updates.unshift({ title, body });
      setUpdates(updates);
      document.getElementById('u-title').value = '';
      document.getElementById('u-body').value = '';
      renderUpdates();
      alert('Update saved. Refresh homepage to view it.');
    }

    function clearUpdates() {
      if (!confirm('Clear all custom updates?')) return;
      setUpdates([]);
      renderUpdates();
    }


    function getFeedback() {
      try {
        const items = JSON.parse(localStorage.getItem(FEEDBACK_KEY) || '[]');
        return Array.isArray(items) ? items : [];
      } catch {
        return [];
      }
    }

    function renderFeedback() {
      const wrap = document.getElementById('feedback-preview');
      const items = getFeedback();
      wrap.innerHTML = items.length
        ? items.map(item => {
            const created = item.createdAt ? new Date(item.createdAt).toLocaleString() : 'Unknown time';
            return `<div class="item"><strong>${escapeHtml(item.aiTopic || 'general')}</strong> · ${escapeHtml(item.aiPriority || 'normal')} priority<br><small>${escapeHtml(created)}</small><p>${escapeHtml(item.message || '')}</p></div>`;
          }).join('')
        : '<p>No feedback submissions yet.</p>';
    }

    function clearFeedback() {
      if (!confirm('Clear all feedback submissions?')) return;
      localStorage.setItem(FEEDBACK_KEY, '[]');
      renderFeedback();
    }

    renderUpdates();
    renderFeedback();
  </script>
</body>
</html>
