<!DOCTYPE html>
<html>
<head>
  <title>Troll Runner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #ff00cc, #3333ff);
      color: white;
      text-align: center;
    }
    header {
      padding: 50px;
      font-size: 2.5em;
      font-weight: bold;
    }
    section {
      padding: 40px;
    }
    #map {
      height: 400px;
      margin: 20px;
      border-radius: 12px;
    }
    a {
      color: yellow;
    }
  </style>
</head>

<body>

<header>
  🧌 Troll Runner
  <div style="font-size: 0.5em;">Running the world, one troll at a time</div>
</header>

<section>
  <h2>Biography</h2>
  <p>
    I run around the world one mile at a time placing trollface stickers.
    Over 80 stickers dropped across Southern California (so far)!
  </p>
</section>

<section>
  <h2>Sticker Map</h2>
  <div id="map"></div>
</section>

<section>
  <h2>Follow Me</h2>
  <a href="#">X Account 1</a><br>
  <a href="#">X Account 2</a>
</section>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  var map = L.map('map').setView([34.05, -118.25], 8);

  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
  }).addTo(map);

  var locations = [
    ["Los Angeles", 34.05, -118.25],
    ["San Diego", 32.72, -117.16],
    ["San Bernardino", 34.11, -117.29]
  ];

  locations.forEach(function(loc) {
    L.marker([loc[1], loc[2]])
      .addTo(map)
      .bindPopup("Sticker placed in " + loc[0]);
  });
</script>

</body>
</html>
