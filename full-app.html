<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Troll Runner</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:-apple-system,sans-serif; }

/* TOP BAR */
#topbar {
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#1c1c1e;
  color:white;
}
#stats { display:flex; gap:12px; font-size:13px; }
#adminToggle { cursor:pointer; }

/* MAP */
#map { height:calc(100vh - 50px); }

/* ADMIN PANEL */
#admin {
  position:absolute;
  top:60px;
  left:10px;
  width:260px;
  background:white;
  padding:12px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  display:none;
  z-index:1000;
}
#admin input {
  width:100%;
  margin:4px 0;
  padding:6px;
}
#admin button {
  width:100%;
  padding:8px;
  margin-top:6px;
}

/* SEARCH */
#search {
  position:absolute;
  top:60px;
  right:10px;
  z-index:1000;
}
#search input {
  padding:8px;
  border-radius:8px;
  border:1px solid #ccc;
}
</style>
</head>

<body>

<div id="topbar">
  <div id="stats"></div>
  <div id="adminToggle">⚙️ Admin</div>
</div>

<div id="map"></div>

<div id="search">
  <input placeholder="Search..." oninput="filter(this.value)">
</div>

<div id="admin">
  <h3>Add Drop</h3>
  <input id="name" placeholder="Location">
  <input id="city" placeholder="City">
  <input id="count" placeholder="Sticker count">
  <input id="date" placeholder="Date">
  <input id="lat" placeholder="Latitude">
  <input id="lng" placeholder="Longitude">
  <button onclick="save()">Save Drop</button>
</div>

<script>
const KEY = "troll_runner_data";

/* STORAGE */
function getData(){
  return JSON.parse(localStorage.getItem(KEY)) || [];
}
function setData(data){
  localStorage.setItem(KEY, JSON.stringify(data));
}

/* MAP */
const map = L.map('map').setView([34.05, -117.3], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const icon = L.icon({
  iconUrl:'https://cdn-icons-png.flaticon.com/512/616/616408.png',
  iconSize:[30,30]
});

let markers = [];
let searchTerm = "";

/* RENDER */
function render(){
  markers.forEach(m=>map.removeLayer(m));
  markers=[];

  const data = getData();

  const filtered = data.filter(d =>
    d.name.toLowerCase().includes(searchTerm) ||
    d.city.toLowerCase().includes(searchTerm)
  );

  filtered.forEach(d=>{
    const m = L.marker([d.lat, d.lng], {icon}).addTo(map);

    m.bindPopup(`
      <b>${d.name}</b><br>
      ${d.city}<br>
      ${d.date}<br>
      ${d.count} stickers
    `);

    markers.push(m);
  });

  stats(data);
}

/* STATS */
function stats(data){
  const stickers = data.reduce((a,b)=>a+b.count,0);
  const cities = new Set(data.map(d=>d.city)).size;

  document.getElementById("stats").innerHTML =
    `🧌 ${stickers} | 📍 ${data.length} | 🏙 ${cities}`;
}

/* SAVE */
function save(){
  const d = {
    name:name.value,
    city:city.value,
    count:parseInt(count.value),
    date:date.value,
    lat:parseFloat(lat.value),
    lng:parseFloat(lng.value)
  };

  const data = getData();
  data.push(d);
  setData(data);

  render();
  alert("Saved!");
}

/* SEARCH */
function filter(v){
  searchTerm = v.toLowerCase();
  render();
}

/* CLICK TO ADD */
map.on('click', e=>{
  lat.value = e.latlng.lat.toFixed(5);
  lng.value = e.latlng.lng.toFixed(5);
});

/* ADMIN TOGGLE */
document.getElementById("adminToggle").onclick = ()=>{
  const panel = document.getElementById("admin");
  panel.style.display = panel.style.display==="block"?"none":"block";
};

/* INIT */
render();
</script>

</body>
</html>
